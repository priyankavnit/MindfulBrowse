<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mindful Browse Settings</title>
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      margin: 0;
    }
    
    h1 {
      font-size: 18px;
      margin: 0 0 15px 0;
      color: #1976d2;
    }
    
    .status {
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-size: 14px;
    }
    
    .status.connected {
      background-color: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #a5d6a7;
    }
    
    .status.disconnected {
      background-color: #fff3e0;
      color: #e65100;
      border: 1px solid #ffcc80;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      font-weight: 500;
      color: #333;
    }
    
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #1976d2;
    }
    
    button {
      width: 100%;
      padding: 10px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
    }
    
    button:hover {
      background-color: #1565c0;
    }
    
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    
    button.secondary {
      background-color: #f5f5f5;
      color: #333;
      border: 1px solid #ddd;
    }
    
    button.secondary:hover {
      background-color: #e0e0e0;
    }
    
    .help-text {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }
    
    .message {
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 10px;
    }
    
    .message.success {
      background-color: #e8f5e9;
      color: #2e7d32;
    }
    
    .message.error {
      background-color: #ffebee;
      color: #c62828;
    }
    
    .link {
      color: #1976d2;
      text-decoration: none;
      font-size: 13px;
    }
    
    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Mindful Browse</h1>
  
  <div id="status" class="status disconnected">
    ⚠️ Not connected - Please log in
  </div>
  
  <div id="message"></div>
  
  <div class="form-group">
    <label for="email">Email</label>
    <input type="text" id="email" placeholder="your@email.com">
  </div>
  
  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password">
    <div class="help-text">
      Your credentials are used to get an auth token and are not stored.
    </div>
  </div>
  
  <button id="loginBtn">Log In</button>
  <button id="logoutBtn" class="secondary" style="display: none;">Log Out</button>
  
  <div style="margin-top: 15px; text-align: center;">
    <a href="https://d3tuctcemzeygi.cloudfront.net" target="_blank" class="link">
      Open Dashboard
    </a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
